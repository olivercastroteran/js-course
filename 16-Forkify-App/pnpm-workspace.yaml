# Complete Security-Hardened pnpm Configuration
minimumReleaseAge: 10080 # 7 days in minutes
minimumReleaseAgeStrict: true
minimumReleaseAgeExclude:
  - 'typescript'
trustPolicy: no-downgrade
trustPolicyExclude:
  - 'chokidar@4.0.3'
blockExoticSubdeps: true

allowBuilds:
  '0': esbuild
  '1': sharp
  '@parcel/watcher': true
  '@swc/core': true
  core-js: true
  lmdb: true
  msgpackr-extract: true
